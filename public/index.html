<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPHYTECH EMPIRE</title>

<style>
:root {
    --primary: #00eaff;
    --accent: #ff3b3b;
    --bg: #050505;
    --card: #0d0d0d;
    --text: #e0e0e0;
}

body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
}

header {
    text-align:center;
    padding:40px;
    border-bottom:1px solid #111;
}

#user-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#0a0a0a;
    border-bottom:1px solid #111;
}

#user-info {
    font-size:14px;
    color: var(--primary);
}

#admin-panel {
    display:none;
    position:fixed;
    right:20px;
    top:80px;
    width:320px;
    background:#000;
    border:1px solid var(--primary);
    padding:20px;
    z-index:9999;
}

#login-modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-box {
    background:#000;
    padding:40px;
    text-align:center;
    border:2px solid var(--primary);
}

button {
    padding:12px 25px;
    border:2px solid var(--primary);
    background:transparent;
    color:var(--primary);
    cursor:pointer;
    margin:5px;
}

button:hover {
    background:var(--primary);
    color:#000;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
    gap:30px;
    padding:40px;
}

.card {
    background:var(--card);
    padding:30px;
    border:1px solid #222;
}

.price {
    font-size:1.8rem;
    margin:15px 0;
}
</style>
</head>

<body>

<div id="user-bar">
    <div id="user-info">Not logged in</div>
    <div>
        <button onclick="toggleAdmin()">Admin</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div id="admin-panel">
    <h3>Admin Panel</h3>
    <input id="sName" placeholder="Service name" /><br><br>
    <input id="sPrice" placeholder="Price" /><br><br>
    <input id="sAction" placeholder="Button text" /><br><br>
    <button onclick="addService()">Add Service</button>
    <button onclick="toggleAdmin()">Close</button>
</div>

<div id="login-modal">
    <div class="modal-box">
        <h2>🔐 Login Required</h2>
        <button onclick="login()">Login with Google</button>
        <br><br>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<header>
    <h1>🔥 EPHYTECH EMPIRE</h1>
</header>

<h2 style="text-align:center;">💀 Services</h2>

<div class="grid" id="serviceGrid"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAXsIo5F1RY1D5U0Q6ejkf-wxWxeX_YzjI",
  authDomain: "ephytech-empire.firebaseapp.com",
  projectId: "ephytech-empire"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const admins = ["admin@ephytech.com"];

let selectedService = "";

let services = JSON.parse(localStorage.getItem("services")) || [
    {name:"Cyber Awareness Training", price:"KES 5,000", action:"ENROLL"},
    {name:"Phishing Protection", price:"KES 4,000", action:"PROTECT"},
    {name:"Freelancing Setup", price:"KES 2,500", action:"LEARN"}
];

function renderServices(){
    const grid = document.getElementById("serviceGrid");
    grid.innerHTML = "";

    services.forEach(s => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <h3>${s.name}</h3>
            <div class="price">${s.price}</div>
            <button onclick="secureAction('${s.name}')">${s.action}</button>
        `;
        grid.appendChild(div);
    });
}

renderServices();

auth.onAuthStateChanged(user => {
    if(user){
        document.getElementById("user-info").innerText = "Logged in: " + user.email;
        if(admins.includes(user.email)){
            document.getElementById("admin-panel").style.display = "block";
        }
        closeModal();
    } else {
        document.getElementById("user-info").innerText = "Not logged in";
    }
});

function login(){
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then(()=>proceed()).catch(e=>alert(e.message));
}

function logout(){ auth.signOut(); }

function secureAction(service){
    selectedService = service;
    if(auth.currentUser) proceed();
    else document.getElementById("login-modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("login-modal").style.display = "none";
}

function proceed(){
    closeModal();
    const msg = encodeURIComponent("Hello I want " + selectedService);
    window.location.href = "https://wa.me/254114419282?text=" + msg;
}

function toggleAdmin(){
    const panel = document.getElementById("admin-panel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function addService(){
    const name = document.getElementById("sName").value;
    const price = document.getElementById("sPrice").value;
    const action = document.getElementById("sAction").value;

    if(!name || !price || !action) return alert("Fill all fields");

    services.push({name, price, action});
    localStorage.setItem("services", JSON.stringify(services));
    renderServices();
    toggleAdmin();
}
</script>

</body>
</html>
